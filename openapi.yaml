openapi: 3.1.0
info:
  title: SigmaShake Platform API
  version: 1.0.0
  description: |
    Unified API specification for the SigmaShake AI-Native platform.
    Covers Agent API, Account API, Shield Daemon, SOC API, Gateway, and DB Server.
  contact:
    name: SigmaShake Engineering
    url: https://sigmashake.com
  license:
    name: Proprietary
    url: https://sigmashake.com/license

servers:
  - url: https://api.sigmashake.com
    description: Production
  - url: https://staging-api.sigmashake.com
    description: Staging

tags:
  - name: agent-auth
    description: Agent authentication and token management
  - name: agent-identity
    description: Agent identity issuance, verification, and revocation
  - name: agent-documents
    description: Document mutation, retrieval, and search
  - name: agent-memory
    description: Agent memory store and recall
  - name: agent-health
    description: Agent API health and status
  - name: account
    description: Account and subscription management
  - name: account-seats
    description: Seat management within accounts
  - name: account-usage
    description: Account usage metrics
  - name: shield
    description: Shield Daemon agent registration and scanning
  - name: soc-incidents
    description: SOC incident management
  - name: soc-alerts
    description: SOC alert retrieval
  - name: soc-metrics
    description: SOC service metrics
  - name: soc-health
    description: SOC platform health and status
  - name: soc-compliance
    description: SOC compliance export and purge
  - name: soc-logs
    description: SOC log ingestion and query
  - name: soc-proxy
    description: SOC proxy tunnel events
  - name: soc-correlation
    description: SOC session correlation and threat detection
  - name: soc-analytics
    description: SOC analytics dashboards
  - name: gateway
    description: Gateway tool call interception
  - name: db-tables
    description: DB Server table management
  - name: db-data
    description: DB Server data insertion and query
  - name: db-vector
    description: DB Server vector search
  - name: db-stream
    description: DB Server SSE streaming
  - name: db-cluster
    description: DB Server cluster management
  - name: db-tenant
    description: DB Server tenant data management
  - name: watchdog
    description: Watchdog monitoring, status page, and health check history
  - name: webhook-dlq
    description: Webhook dead letter queue management
  - name: auth-security
    description: User authentication security (2FA/TOTP, email verification, recovery codes)
  - name: saml
    description: SAML 2.0 Service Provider (SP) SSO configuration and endpoints
  - name: scim
    description: SCIM 2.0 (RFC 7644) user and group provisioning
  - name: api-keys
    description: API key generation, listing, and revocation
  - name: audit-forwarding
    description: Audit log forwarding configuration and delivery status

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer token. Claims include: sub, roles, exp, iat, iss, tenant_id, tier.

  schemas:
    # ── Common ──────────────────────────────────────────────────
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error description
      example:
        error: "unauthorized: token expired"

    HealthOk:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        version:
          type: string
          description: Git SHA of the deployed version
        checked_at:
          type: string
          format: date-time
      example:
        status: ok
        version: "a1b2c3d"

    DeepHealthResponse:
      type: object
      required: [status, version, checks, checked_at]
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        version:
          type: string
          description: Git SHA of the deployed version
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DependencyCheck"
        checked_at:
          type: string
          format: date-time

    DependencyCheck:
      type: object
      required: [name, status, latency_ms]
      properties:
        name:
          type: string
          description: Name of the dependency being checked
        status:
          type: string
          enum: [pass, warn, fail]
        latency_ms:
          type: integer
        message:
          type: string

    WatchdogStatus:
      type: object
      required: [overall, services, checked_at]
      properties:
        overall:
          type: string
          enum: [operational, degraded, outage]
        services:
          type: array
          items:
            $ref: "#/components/schemas/WatchdogServiceStatus"
        active_incidents:
          type: integer
        checked_at:
          type: string
          format: date-time

    WatchdogServiceStatus:
      type: object
      required: [name, status, uptime_pct]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, degraded, unhealthy, unknown]
        uptime_pct:
          type: number
          description: Rolling 90-day uptime percentage
        last_check:
          type: string
          format: date-time
        consecutive_failures:
          type: integer
        last_version:
          type: string

    WatchdogCheckRecord:
      type: object
      required: [service_name, status, checked_at]
      properties:
        service_name:
          type: string
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        latency_ms:
          type: integer
        version:
          type: string
        checked_at:
          type: string
          format: date-time
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DependencyCheck"

    WebhookDlqEntry:
      type: object
      required: [id, endpoint_url, payload, failed_at, attempts]
      properties:
        id:
          type: string
          format: uuid
        endpoint_url:
          type: string
        payload:
          type: object
        failed_at:
          type: string
          format: date-time
        attempts:
          type: integer
        last_error:
          type: string

    Tier:
      type: string
      enum: [Free, Pro, Enterprise]

    Role:
      type: string
      enum: [Owner, Admin, Member]

    # ── Agent API: Auth ─────────────────────────────────────────
    TokenRequest:
      type: object
      required: [agent_id, scopes]
      properties:
        agent_id:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
        ttl_secs:
          type: integer
          minimum: 1
          description: Optional token TTL in seconds

    TokenResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    # ── Agent API: Identity ─────────────────────────────────────
    IssuanceModel:
      type: string
      enum: [direct, delegated]

    IssueIdentityRequest:
      type: object
      required: [agent_id, capabilities, ttl_secs, delegation_chain]
      properties:
        agent_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
        ttl_secs:
          type: integer
          minimum: 1
        issuance_model:
          $ref: "#/components/schemas/IssuanceModel"
        delegator:
          type: string
          format: uuid
          description: Agent ID of the delegating agent (required if issuance_model is delegated)
        delegation_chain:
          type: array
          items:
            type: string
            format: uuid

    IdentityTokenResponse:
      type: object
      required: [token, agent_id, trust_domain, expires_in]
      properties:
        token:
          type: string
        agent_id:
          type: string
          format: uuid
        trust_domain:
          type: string
        expires_in:
          type: integer
          description: Seconds until token expiry

    VerifyIdentityRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AgentIdentityClaims:
      type: object
      required: [agent_id, capabilities, trust_domain, issued_at, expires_at, issuance_model, delegation_chain]
      properties:
        agent_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
        trust_domain:
          type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        issuance_model:
          $ref: "#/components/schemas/IssuanceModel"
        delegator:
          type: string
          format: uuid
        delegation_chain:
          type: array
          items:
            type: string
            format: uuid

    RevokeIdentityRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    # ── Agent API: Documents ────────────────────────────────────
    MutationRequest:
      type: object
      required: [resource, action, payload]
      properties:
        resource:
          type: string
        action:
          type: string
        payload:
          type: object
          additionalProperties: true

    MutationResponse:
      type: object
      required: [id, success]
      properties:
        id:
          type: string
          format: uuid
        success:
          type: boolean

    DocumentMetadata:
      type: object
      additionalProperties: true

    DocumentClassification:
      type: string
      enum: [public, internal, confidential, restricted]

    Document:
      type: object
      required: [id, tenant_id, content, metadata, classification]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        content:
          type: object
          additionalProperties: true
        metadata:
          $ref: "#/components/schemas/DocumentMetadata"
        classification:
          $ref: "#/components/schemas/DocumentClassification"

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 20

    SearchResponse:
      type: object
      required: [documents, total]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        total:
          type: integer

    # ── Agent API: Memory ───────────────────────────────────────
    StoreRequest:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time

    MemoryEntry:
      type: object
      required: [key, value, tags, created_at]
      properties:
        key:
          type: string
        value:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    MemoryQuery:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        prefix:
          type: string
        content:
          type: string

    # ── Agent API: Status ───────────────────────────────────────
    AuthenticatedStatus:
      type: object
      required: [authenticated, sub, roles]
      properties:
        authenticated:
          type: boolean
        sub:
          type: string
        roles:
          type: array
          items:
            type: string

    # ── Account API ─────────────────────────────────────────────
    SubscriptionStatus:
      type: string
      enum: [Active, PastDue, Canceled, Trialing]

    Subscription:
      type: object
      required: [tier, seats_purchased, status, current_period_start, current_period_end]
      properties:
        tier:
          $ref: "#/components/schemas/Tier"
        seats_purchased:
          type: integer
        status:
          $ref: "#/components/schemas/SubscriptionStatus"
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time

    Account:
      type: object
      required: [id, name, subscription, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subscription:
          $ref: "#/components/schemas/Subscription"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAccountBody:
      type: object
      required: [name, tier]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        tier:
          $ref: "#/components/schemas/Tier"

    UpdateSubscriptionBody:
      type: object
      required: [tier, seats]
      properties:
        tier:
          $ref: "#/components/schemas/Tier"
        seats:
          type: integer
          minimum: 1

    Seat:
      type: object
      required: [id, tenant_id, user_id, role, assigned_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/Role"
        assigned_at:
          type: string
          format: date-time

    AddSeatBody:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/Role"

    TenantUsage:
      type: object
      required: [tenant_id, period_start, seats_used, agents_registered, tool_calls, cost_units]
      properties:
        tenant_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        seats_used:
          type: integer
        agents_registered:
          type: integer
        tool_calls:
          type: integer
        cost_units:
          type: number
          format: double

    # ── Shield Daemon ───────────────────────────────────────────
    AgentType:
      type: string
      enum: [autonomous, supervised, tool, orchestrator]

    AgentRegistration:
      type: object
      required: [agent_id, agent_type, allowed_scopes, session_ttl_secs]
      properties:
        agent_id:
          type: string
          format: uuid
        agent_type:
          $ref: "#/components/schemas/AgentType"
        allowed_scopes:
          type: array
          items:
            type: string
        token_budget:
          type: integer
          minimum: 0
        session_ttl_secs:
          type: integer
          minimum: 1

    AgentSession:
      type: object
      required: [session_id, agent_id, agent_type, created_at, expires_at]
      properties:
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        agent_type:
          $ref: "#/components/schemas/AgentType"
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ScanOperation:
      type: object
      required: [tool_name, input]
      properties:
        tool_name:
          type: string
        input:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true

    ScanContext:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        tier:
          $ref: "#/components/schemas/Tier"
        prior_violations:
          type: integer

    ScanRequest:
      type: object
      required: [agent_id, session_id, operation, context]
      properties:
        agent_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        operation:
          $ref: "#/components/schemas/ScanOperation"
        context:
          $ref: "#/components/schemas/ScanContext"

    Verdict:
      type: string
      enum: [allow, deny, warn, escalate]

    Severity:
      type: string
      enum: [info, low, medium, high, critical]

    ScanResult:
      type: object
      required: [detector_id, detector_version, verdict, evidence, severity]
      properties:
        detector_id:
          type: string
        detector_version:
          type: string
        verdict:
          $ref: "#/components/schemas/Verdict"
        evidence:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"

    Capabilities:
      type: object
      required: [agent_id, allowed_scopes, token_budget, token_used]
      properties:
        agent_id:
          type: string
          format: uuid
        allowed_scopes:
          type: array
          items:
            type: string
        token_budget:
          type: integer
        token_used:
          type: integer

    # ── SOC API ─────────────────────────────────────────────────
    IncidentStatus:
      type: string
      enum: [open, acknowledged, resolved]

    IncidentSeverity:
      type: string
      enum: [info, low, medium, high, critical]

    StoredIncident:
      type: object
      required: [id, title, status, severity, service, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/IncidentStatus"
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        service:
          type: string
        created_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        acknowledged_by:
          type: string
        resolved_at:
          type: string
          format: date-time
        resolved_by:
          type: string
        resolution_summary:
          type: string

    Alert:
      type: object
      required: [id, name, severity, service, fired_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        service:
          type: string
        message:
          type: string
        fired_at:
          type: string
          format: date-time

    MetricSummary:
      type: object
      required: [name, value, unit, timestamp]
      properties:
        name:
          type: string
        value:
          type: number
          format: double
        unit:
          type: string
        timestamp:
          type: string
          format: date-time

    ServiceHealth:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
          enum: [healthy, degraded, down]
        latency_ms:
          type: number
        last_check:
          type: string
          format: date-time

    AggregateHealth:
      type: object
      required: [overall, services]
      properties:
        overall:
          type: string
          enum: [healthy, degraded, down]
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceHealth"

    PlatformStatus:
      type: object
      required: [status, version, uptime_secs]
      properties:
        status:
          type: string
          enum: [operational, degraded, outage]
        version:
          type: string
        uptime_secs:
          type: integer

    ComplianceExportManifest:
      type: object
      required: [tenant_id, exported_at, tables, total_rows]
      properties:
        tenant_id:
          type: string
          format: uuid
        exported_at:
          type: string
          format: date-time
        tables:
          type: array
          items:
            type: string
        total_rows:
          type: integer

    CompliancePurgeProof:
      type: object
      required: [tenant_id, purged_at, tables_purged, rows_deleted]
      properties:
        tenant_id:
          type: string
          format: uuid
        purged_at:
          type: string
          format: date-time
        tables_purged:
          type: array
          items:
            type: string
        rows_deleted:
          type: integer

    LlmLogEntry:
      type: object
      required: [session_id, agent_id, tenant_id, model, prompt_tokens, completion_tokens, timestamp]
      properties:
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        model:
          type: string
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        cost_units:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    IngestResponse:
      type: object
      required: [accepted, ingested]
      properties:
        accepted:
          type: integer
        ingested:
          type: integer

    StoredLlmLog:
      type: object
      required: [id, session_id, agent_id, tenant_id, model, prompt_tokens, completion_tokens, timestamp]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        model:
          type: string
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        cost_units:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    ProxyTunnelEvent:
      type: object
      required: [session_id, tenant_id, event_type, timestamp]
      properties:
        session_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        event_type:
          type: string
        host:
          type: string
        bytes_in:
          type: integer
        bytes_out:
          type: integer
        status_code:
          type: integer
        timestamp:
          type: string
          format: date-time

    ProxyEventsAccepted:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: integer

    CorrelationFilter:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        min_severity:
          $ref: "#/components/schemas/IncidentSeverity"

    CorrelatedSession:
      type: object
      required: [session_id, tenant_id, agent_id, events, threat_score, created_at]
      properties:
        session_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        events:
          type: array
          items:
            type: object
            additionalProperties: true
        threat_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    TimelineEvent:
      type: object
      required: [timestamp, event_type, source]
      properties:
        timestamp:
          type: string
          format: date-time
        event_type:
          type: string
        source:
          type: string
        detail:
          type: object
          additionalProperties: true

    SessionTimeline:
      type: object
      required: [session_id, events]
      properties:
        session_id:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"

    HostTrafficSummary:
      type: object
      required: [host, request_count, bytes_total]
      properties:
        host:
          type: string
        request_count:
          type: integer
        bytes_total:
          type: integer

    SessionCostSummary:
      type: object
      required: [session_id, agent_id, cost_units, tool_calls]
      properties:
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        cost_units:
          type: number
          format: double
        tool_calls:
          type: integer

    ThreatHeatmapEntry:
      type: object
      required: [hour, day, threat_count, avg_severity]
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        day:
          type: string
        threat_count:
          type: integer
        avg_severity:
          type: number
          format: double

    AckIncidentBody:
      type: object
      required: [by]
      properties:
        by:
          type: string

    ResolveIncidentBody:
      type: object
      required: [by, summary]
      properties:
        by:
          type: string
        summary:
          type: string

    # ── Gateway ─────────────────────────────────────────────────
    ToolCall:
      type: object
      required: [name, input, tenant_id, tier, session_id, agent_id]
      properties:
        name:
          type: string
        input:
          type: object
          additionalProperties: true
        tenant_id:
          type: string
          format: uuid
        tier:
          $ref: "#/components/schemas/Tier"
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid

    ToolResult:
      type: object
      required: [tool_call, output, elapsed_ms]
      properties:
        tool_call:
          $ref: "#/components/schemas/ToolCall"
        output:
          type: object
          additionalProperties: true
        error:
          type: string
        elapsed_ms:
          type: integer

    Violation:
      type: object
      required: [rule, message, severity]
      properties:
        rule:
          type: string
        message:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"

    InterceptResult:
      type: object
      required: [allowed, reason, cost_units, violations]
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        cost_units:
          type: number
          format: double
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"

    # ── DB Server ───────────────────────────────────────────────
    ColumnType:
      type: string
      enum: [uint64, int64, float64, string, timestamp, uuid, bool, json]

    Compression:
      type: string
      enum: [lz4, delta_lz4, dict_lz4]

    ColumnDef:
      type: object
      required: [name, col_type]
      properties:
        name:
          type: string
        col_type:
          $ref: "#/components/schemas/ColumnType"
        compression:
          $ref: "#/components/schemas/Compression"

    CreateTableRequest:
      type: object
      required: [name, columns]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnDef"
          minItems: 1
          maxItems: 500

    CreateTableResponse:
      type: object
      required: [name, columns, created_at]
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnDef"
        created_at:
          type: string
          format: date-time

    ColumnData:
      type: object
      required: [name, data]
      properties:
        name:
          type: string
        data:
          type: array
          items: {}

    InsertRequest:
      type: object
      required: [table, columns]
      properties:
        table:
          type: string
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnData"

    InsertResponse:
      type: object
      required: [ok, rows_inserted]
      properties:
        ok:
          type: boolean
        rows_inserted:
          type: integer

    FilterOp:
      type: string
      enum: [eq, ne, lt, le, gt, ge]

    Filter:
      type: object
      required: [column, op, value]
      properties:
        column:
          type: string
        op:
          $ref: "#/components/schemas/FilterOp"
        value: {}

    AggregateType:
      type: string
      enum: [count, sum, min, max, avg]

    Aggregate:
      type: object
      required: [column, function]
      properties:
        column:
          type: string
        function:
          $ref: "#/components/schemas/AggregateType"

    TimeRange:
      type: object
      required: [column, start, end]
      properties:
        column:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    QueryRequest:
      type: object
      required: [table]
      properties:
        table:
          type: string
        filters:
          type: array
          items:
            $ref: "#/components/schemas/Filter"
        projections:
          type: array
          items:
            type: string
        aggregates:
          type: array
          items:
            $ref: "#/components/schemas/Aggregate"
        group_by:
          type: array
          items:
            type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100000
        offset:
          type: integer
          minimum: 0
        time_range:
          $ref: "#/components/schemas/TimeRange"
        tenant_id:
          type: string
          format: uuid

    QueryResponse:
      type: object
      required: [columns, rows, total]
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        total:
          type: integer

    ScrollQueryRequest:
      type: object
      properties:
        table:
          type: string
        filters:
          type: array
          items:
            $ref: "#/components/schemas/Filter"
        projections:
          type: array
          items:
            type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100000
        time_range:
          $ref: "#/components/schemas/TimeRange"
        tenant_id:
          type: string
          format: uuid
        cursor:
          type: string

    ScrollQueryResponse:
      type: object
      required: [columns, rows, next_cursor]
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Null if no more results.

    VectorMetric:
      type: string
      enum: [cosine, dot_product, l2]

    VectorSearchRequest:
      type: object
      required: [table, column, query, k, metric]
      properties:
        table:
          type: string
        column:
          type: string
        query:
          type: array
          items:
            type: number
            format: double
          maxItems: 10000
        k:
          type: integer
          minimum: 1
          maximum: 1000
        metric:
          $ref: "#/components/schemas/VectorMetric"

    VectorSearchResult:
      type: object
      required: [id, score, data]
      properties:
        id:
          type: string
        score:
          type: number
          format: double
        data:
          type: object
          additionalProperties: true

    VectorSearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/VectorSearchResult"

    PurgeTenantResponse:
      type: object
      required: [tenant_id, tables_purged, rows_deleted]
      properties:
        tenant_id:
          type: string
          format: uuid
        tables_purged:
          type: array
          items:
            type: string
        rows_deleted:
          type: integer

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        node_id:
          type: string
        cluster_size:
          type: integer

    ClusterNodeStatus:
      type: string
      enum: [active, draining, down]

    ClusterInitRequest:
      type: object
      required: [node_id, advertise_addr]
      properties:
        node_id:
          type: string
        advertise_addr:
          type: string

    ClusterInitResponse:
      type: object
      required: [cluster_id, node_id, status]
      properties:
        cluster_id:
          type: string
          format: uuid
        node_id:
          type: string
        status:
          $ref: "#/components/schemas/ClusterNodeStatus"

    ClusterAddNodeRequest:
      type: object
      required: [node_id, advertise_addr]
      properties:
        node_id:
          type: string
        advertise_addr:
          type: string

    ClusterNodeResponse:
      type: object
      required: [node_id, status]
      properties:
        node_id:
          type: string
        status:
          $ref: "#/components/schemas/ClusterNodeStatus"

    ClusterStatusResponse:
      type: object
      required: [cluster_id, nodes, leader]
      properties:
        cluster_id:
          type: string
          format: uuid
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/ClusterNodeResponse"
        leader:
          type: string

    # ── Auth Security ──────────────────────────────────────────
    TotpStatusResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    TotpSetupResponse:
      type: object
      required: [qr_code_url, secret]
      properties:
        qr_code_url:
          type: string
          description: Data URI containing QR code PNG
        secret:
          type: string
          description: Base32-encoded TOTP secret

    TotpConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code

    TotpConfirmResponse:
      type: object
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          items:
            type: string
          description: One-time recovery codes in XXXX-XXXX format

    TotpCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code

    EmailVerifySendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerifyConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Email verification token from the link

    RecoveryCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Recovery code in XXXX-XXXX format

    RecoveryCodesResponse:
      type: object
      required: [codes]
      properties:
        codes:
          type: array
          items:
            type: string
          description: Regenerated recovery codes in XXXX-XXXX format

    SecurityStatusResponse:
      type: object
      required: [email_verified, totp_enabled, recovery_codes_remaining]
      properties:
        email_verified:
          type: boolean
        totp_enabled:
          type: boolean
        recovery_codes_remaining:
          type: integer

    # ── SAML 2.0 ──────────────────────────────────────────────────
    SamlConfig:
      type: object
      required: [idp_entity_id, idp_sso_url, idp_certificate, name_id_format, enabled]
      properties:
        idp_entity_id:
          type: string
          description: IdP Entity ID (issuer URI)
        idp_sso_url:
          type: string
          format: uri
          description: IdP Single Sign-On URL
        idp_slo_url:
          type: string
          format: uri
          description: IdP Single Logout URL (optional)
        idp_certificate:
          type: string
          description: IdP X.509 certificate in PEM format
        name_id_format:
          type: string
          description: "SAML NameID format (e.g. urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress)"
        attribute_mapping:
          type: object
          additionalProperties:
            type: string
          description: Mapping of SAML attributes to platform user fields
        enabled:
          type: boolean

    SamlConfigRequest:
      type: object
      required: [idp_entity_id, idp_sso_url, idp_certificate, name_id_format]
      properties:
        idp_entity_id:
          type: string
        idp_sso_url:
          type: string
          format: uri
        idp_slo_url:
          type: string
          format: uri
        idp_certificate:
          type: string
          description: IdP X.509 certificate in PEM format
        name_id_format:
          type: string
        attribute_mapping:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
          default: true

    SamlLoginRequest:
      type: object
      properties:
        relay_state:
          type: string
          description: Optional RelayState passed through the SSO flow

    SamlLoginResponse:
      type: object
      required: [redirect_url]
      properties:
        redirect_url:
          type: string
          format: uri
          description: URL to redirect the user agent to the IdP

    SamlAcsResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds

    # ── SCIM 2.0 (RFC 7643/7644) ─────────────────────────────────
    ScimUser:
      type: object
      required: [schemas, userName, name, emails, active]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:User"]
        id:
          type: string
          format: uuid
        externalId:
          type: string
        userName:
          type: string
        name:
          type: object
          required: [givenName, familyName]
          properties:
            givenName:
              type: string
            familyName:
              type: string
        emails:
          type: array
          items:
            type: object
            required: [value]
            properties:
              value:
                type: string
                format: email
              type:
                type: string
              primary:
                type: boolean
        active:
          type: boolean
        groups:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              display:
                type: string
        meta:
          type: object
          properties:
            resourceType:
              type: string
            created:
              type: string
              format: date-time
            lastModified:
              type: string
              format: date-time
            location:
              type: string
              format: uri

    ScimGroup:
      type: object
      required: [schemas, displayName]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:Group"]
        id:
          type: string
          format: uuid
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              display:
                type: string
              type:
                type: string
        meta:
          type: object
          properties:
            resourceType:
              type: string
            created:
              type: string
              format: date-time
            lastModified:
              type: string
              format: date-time
            location:
              type: string
              format: uri

    ScimListResponse:
      type: object
      required: [schemas, totalResults, startIndex, itemsPerPage, Resources]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
        totalResults:
          type: integer
        startIndex:
          type: integer
        itemsPerPage:
          type: integer
        Resources:
          type: array
          items: {}

    ScimBulkRequest:
      type: object
      required: [schemas, Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:BulkRequest"]
        Operations:
          type: array
          items:
            type: object
            required: [method, path]
            properties:
              method:
                type: string
                enum: [POST, PUT, PATCH, DELETE]
              path:
                type: string
              bulkId:
                type: string
              data:
                type: object
                additionalProperties: true

    ScimBulkResponse:
      type: object
      required: [schemas, Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:BulkResponse"]
        Operations:
          type: array
          items:
            type: object
            required: [method, path, status]
            properties:
              method:
                type: string
              path:
                type: string
              bulkId:
                type: string
              status:
                type: string
              response:
                type: object
                additionalProperties: true

    ScimPatchOp:
      type: object
      required: [schemas, Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:PatchOp"]
        Operations:
          type: array
          items:
            type: object
            required: [op]
            properties:
              op:
                type: string
                enum: [add, remove, replace]
              path:
                type: string
              value: {}

    ScimError:
      type: object
      required: [schemas, status, detail]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:Error"]
        status:
          type: string
          description: HTTP status code as string
        detail:
          type: string
        scimType:
          type: string
          description: "SCIM error type (e.g. invalidFilter, tooMany, uniqueness)"

    ScimServiceProviderConfig:
      type: object
      required: [schemas, documentationUri, patch, bulk, filter, changePassword, sort, etag]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:ServiceProviderConfig"]
        documentationUri:
          type: string
          format: uri
        patch:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean
        bulk:
          type: object
          required: [supported, maxOperations, maxPayloadSize]
          properties:
            supported:
              type: boolean
            maxOperations:
              type: integer
            maxPayloadSize:
              type: integer
        filter:
          type: object
          required: [supported, maxResults]
          properties:
            supported:
              type: boolean
            maxResults:
              type: integer
        changePassword:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean
        sort:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean
        etag:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean

    # ── API Keys ──────────────────────────────────────────────────
    ApiKeyScope:
      type: string
      enum: [read, write, admin]

    ApiKeyCreateRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
          minItems: 1
        expires_at:
          type: string
          format: date-time
          description: Optional expiration timestamp (ISO 8601)

    ApiKeyCreateResponse:
      type: object
      required: [id, name, key, scopes, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
          description: Full API key value. ONLY returned on create, never retrievable again.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ApiKeyMetadata:
      type: object
      required: [id, name, scopes, created_at, key_prefix]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        key_prefix:
          type: string
          description: First 8 characters of the key for identification

    ApiKeyListResponse:
      type: object
      required: [keys, total]
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyMetadata"
        total:
          type: integer

    ApiKeyUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
          minItems: 1

    # ── Audit Log Forwarding ──────────────────────────────────────
    AuditSinkType:
      type: string
      enum: [webhook, s3, gcs]

    WebhookSinkConfig:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS webhook endpoint URL
        secret:
          type: string
          description: Shared secret for HMAC-SHA256 payload signing
        retry_attempts:
          type: integer
          minimum: 0
          maximum: 10
          default: 3
        timeout_secs:
          type: integer
          minimum: 1
          maximum: 60
          default: 10

    S3SinkConfig:
      type: object
      required: [bucket, region]
      properties:
        bucket:
          type: string
        prefix:
          type: string
          description: Object key prefix
        region:
          type: string
        access_key_id:
          type: string
          description: AWS access key (omit if using role_arn)
        secret_access_key:
          type: string
          description: AWS secret key (omit if using role_arn)
        role_arn:
          type: string
          description: IAM role ARN for cross-account access

    GcsSinkConfig:
      type: object
      required: [bucket]
      properties:
        bucket:
          type: string
        prefix:
          type: string
          description: Object name prefix
        service_account_json:
          type: string
          description: GCP service account key JSON (omit if using workload identity)
        workload_identity:
          type: boolean
          description: Use GCP Workload Identity Federation instead of service account key

    AuditSink:
      type: object
      required: [type, config]
      properties:
        type:
          $ref: "#/components/schemas/AuditSinkType"
        config:
          oneOf:
            - $ref: "#/components/schemas/WebhookSinkConfig"
            - $ref: "#/components/schemas/S3SinkConfig"
            - $ref: "#/components/schemas/GcsSinkConfig"
          discriminator:
            propertyName: type

    AuditForwardingConfig:
      type: object
      required: [enabled, sinks]
      properties:
        enabled:
          type: boolean
        sinks:
          type: array
          items:
            $ref: "#/components/schemas/AuditSink"

    AuditForwardingStatus:
      type: object
      required: [enabled, events_delivered_24h, events_failed_24h]
      properties:
        enabled:
          type: boolean
        last_delivery_at:
          type: string
          format: date-time
        events_delivered_24h:
          type: integer
        events_failed_24h:
          type: integer
        last_error:
          type: string

    AuditForwardingTestResponse:
      type: object
      required: [success, latency_ms]
      properties:
        success:
          type: boolean
        error:
          type: string
        latency_ms:
          type: integer

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource conflict (duplicate)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotImplemented:
      description: Feature not implemented
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

# ════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════
paths:
  # ── Agent API: Auth ─────────────────────────────────────────
  /auth/token:
    post:
      operationId: createToken
      tags: [agent-auth]
      summary: Issue a JWT token for an agent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [agent-auth]
      summary: Refresh an expired token
      security: []
      requestBody:
        required: true
        content:
